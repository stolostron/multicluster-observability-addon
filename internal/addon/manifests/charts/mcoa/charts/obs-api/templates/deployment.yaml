{{- if .Values.enabled }}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: mcoa-observability-observatorium-api
  namespace: open-cluster-management-observability
  labels:
    app: {{ template "obsapihelm.name" . }}
    chart: {{ template "obsapihelm.chart" . }}
    release: {{ .Release.Name }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: mcoa-api
      app.kubernetes.io/instance: mcoa-observability
      app.kubernetes.io/name: mcoa-observatorium-api
      app.kubernetes.io/part-of: mcoa-observatorium
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mcoa-api
        app.kubernetes.io/instance: mcoa-observability
        app.kubernetes.io/name: mcoa-observatorium-api
        app.kubernetes.io/part-of: mcoa-observatorium
    spec:
      restartPolicy: Always
      serviceAccountName: observability-observatorium-api
      imagePullSecrets:
        - name: multiclusterhub-operator-pull-secret
      schedulerName: default-scheduler
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 30
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - mcoa-observatorium-api
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - mcoa-observability
                topologyKey: kubernetes.io/hostname
            - weight: 70
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - mcoa-observatorium-api
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - mcoa-observability
                topologyKey: topology.kubernetes.io/zone
      terminationGracePeriodSeconds: 30
      securityContext: {}
      containers:
        - resources:
            requests:
              cpu: 20m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 12
          terminationMessagePath: /dev/termination-log
          name: observatorium-api
          livenessProbe:
            httpGet:
              path: /live
              port: 8081
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 10
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
          ports:
            - name: internal
              containerPort: 8081
              protocol: TCP
            - name: public
              containerPort: 8080
              protocol: TCP
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: rbac
              readOnly: true
              mountPath: /etc/observatorium/rbac.yaml
              subPath: rbac.yaml
            - name: tenants
              readOnly: true
              mountPath: /etc/observatorium/tenants.yaml
              subPath: tenants.yaml
            - name: default-mtls-secret
              readOnly: true
              mountPath: /var/run/mtls/default/tls.crt
              subPath: tls.crt
            - name: tls-secret
              readOnly: true
              mountPath: /var/run/tls/tls.crt
              subPath: tls.crt
            - name: tls-secret
              readOnly: true
              mountPath: /var/run/tls/tls.key
              subPath: tls.key
            - name: tls-secret
              readOnly: true
              mountPath: /var/run/tls/ca.crt
              subPath: ca.crt
          terminationMessagePolicy: File
          image: 'registry.redhat.io/rhacm2/observatorium-rhel9@sha256:039a55acb60e43d47c80a682167c8563ee45e7a5bb8b71d60ff6346542caadfd'
          args:
            - '--web.listen=0.0.0.0:8080'
            - '--web.internal.listen=0.0.0.0:8081'
            - '--metrics.read.endpoint=http://observability-thanos-query-frontend.open-cluster-management-observability.svc.cluster.local:9090'
            - '--metrics.write.endpoint=http://observability-thanos-receive.open-cluster-management-observability.svc.cluster.local:19291'
            - '--log.level=warn'
            - '--rbac.config=/etc/observatorium/rbac.yaml'
            - '--tenants.config=/etc/observatorium/tenants.yaml'
            - '--web.healthchecks.url=https://127.0.0.1:8080'
            - '--tls.server.cert-file=/var/run/tls/tls.crt'
            - '--tls.server.key-file=/var/run/tls/tls.key'
            - '--tls.healthchecks.server-ca-file=/var/run/tls/ca.crt'
            - '--tls.healthchecks.server-name=observability-server-certificate'
            - '--metrics.write-timeout=5m'
            - '--server.read-header-timeout=10s'
      serviceAccount: observability-observatorium-api
      volumes:
        - name: rbac
          configMap:
            name: observability-observatorium-api
            defaultMode: 420
        - name: tenants
          secret:
            secretName: observability-observatorium-api
            defaultMode: 420
        - name: default-mtls-secret
          secret:
            secretName: observability-client-ca-certs
            defaultMode: 420
        - name: tls-secret
          secret:
            secretName: observability-server-certs
            defaultMode: 420
      dnsPolicy: ClusterFirst
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
{{- end }}