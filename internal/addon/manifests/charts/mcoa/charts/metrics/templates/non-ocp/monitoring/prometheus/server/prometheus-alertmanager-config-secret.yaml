{{- if and .Values.deployNonOCPStack .Values.hubEndpoint }}
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
type: Opaque
stringData:
  alertmanager.yaml: |-
    - authorization:
        type: Bearer
        credentials_file: /etc/prometheus/secrets/{{ .Values.alertmanagerAccessorSecretName }}/token
      tls_config:
        ca_file: /etc/prometheus/secrets/{{ .Values.alertmanagerRouterCASecretName }}/ca.crt
        cert_file: /etc/prometheus/secrets/{{ .Values.clientCertSecretName }}/tls.crt
        key_file: /etc/prometheus/secrets/{{ .Values.clientCertSecretName }}/tls.key
        server_name: ""
        insecure_skip_verify: false
      follow_redirects: true
      scheme: https
      path_prefix: /api/alertmanager/v2/default
      timeout: 10s
      api_version: v2
      static_configs:
      - targets:
        - {{ .Values.hubEndpoint }}
{{- end }}