{{- if and (or .Values.platformEnabled .Values.userWorkloadsEnabled) (not .Values.deployNonOCPStack) }}
apiVersion: v1
kind: Service
metadata:
  name: endpoint-monitoring-operator-metrics
  namespace: {{ .Release.Namespace }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: endpoint-monitoring-operator-tls
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator
    {{- include "metricshelm.labels" . | nindent 4 }}
spec:
  ports:
  - name: metrics
    port: 8443
    targetPort: metrics
  selector:
    app: metrics
    app.kubernetes.io/component: endpoint-monitoring-operator
{{- end }}
