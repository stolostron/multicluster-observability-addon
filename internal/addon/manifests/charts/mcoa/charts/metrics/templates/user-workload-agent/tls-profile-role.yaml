{{- if .Values.userWorkloadsEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.userWorkload.appName }}-tls-profile
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: {{ .Values.userWorkload.component }}
    app.kubernetes.io/name: {{ .Values.userWorkload.appName }}-tls-profile
    {{ include "metricshelm.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
{{- end }}
