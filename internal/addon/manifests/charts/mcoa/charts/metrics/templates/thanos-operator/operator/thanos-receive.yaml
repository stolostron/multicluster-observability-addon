{{- if and .Values.thanosOperator.enabled .Values.thanosOperator.receiveSpec.data }}
apiVersion: monitoring.thanos.io/v1alpha1
kind: ThanosReceive
metadata:
  name: mcoa-receive
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: receive
    app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
    {{ include "metricshelm.labels" . | nindent 4 }}
spec:
{{- fromJson .Values.thanosOperator.receiveSpec.data | toYaml | nindent 2 }}
{{- end }}