{{- if and (or .Values.platformEnabled .Values.userWorkloadsEnabled) (not .Values.deployNonOCPStack) }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "mcoa.globalResourcePrefix" "endpoint-monitoring-operator-metrics" }}
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator
    {{- include "metricshelm.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: endpoint-monitoring-operator
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcoa.globalResourcePrefix" "endpoint-monitoring-operator-metrics" }}
{{- end }}
