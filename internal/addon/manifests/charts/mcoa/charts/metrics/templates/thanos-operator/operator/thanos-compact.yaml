{{- if and .Values.thanosOperator.enabled .Values.thanosOperator.compactSpec.data }}
apiVersion: monitoring.thanos.io/v1alpha1
kind: ThanosCompact
metadata:
  name: mcoa-compact
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: compact
    app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
    {{ include "metricshelm.labels" . | nindent 4 }}
spec:
{{- fromJson .Values.thanosOperator.compactSpec.data | toYaml | nindent 2 }}
{{- end }}