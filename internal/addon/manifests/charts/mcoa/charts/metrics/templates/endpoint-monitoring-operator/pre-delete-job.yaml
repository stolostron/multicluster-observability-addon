{{- if and .Values.images .Values.images.endpointMonitoringOperator }}
# Note: The pre-delete job and its ServiceAccount/RBAC resources must be rendered 
# unconditionally whenever images are defined. When the ClusterManagementAddOn is deleted,
# the PrometheusAgent configuration resources are garbage collected, making the metrics
# collection resolve as disabled (platformEnabled: false).
# To ensure the addon framework can discover and execute this pre-delete cleanup hook 
# during uninstallation, we must not wrap these resources in 'if .Values.platformEnabled' 
# conditional checks.
{{- $appName := "observability-monitoring-cleanup" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: observability-pre-delete-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator-cleanup
    {{- include "metricshelm.labels" . | nindent 4 }}
{{- if .Values.global.imagePullSecret }}
imagePullSecrets:
  - name: "{{ .Values.global.imagePullSecret }}"
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mcoa.globalResourcePrefix" "observability-addon-cleanup" }}
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator-cleanup
    {{- include "metricshelm.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["cluster-monitoring-config", "user-workload-monitoring-config"]
  verbs: ["get", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcoa.globalResourcePrefix" "observability-addon-cleanup" }}
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator-cleanup
    {{- include "metricshelm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcoa.globalResourcePrefix" "observability-addon-cleanup" }}
subjects:
- kind: ServiceAccount
  name: observability-pre-delete-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: observability-monitoring-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    addon.open-cluster-management.io/addon-pre-delete: ""
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator-cleanup
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/component: endpoint-monitoring-operator-cleanup
    spec:
      serviceAccountName: observability-pre-delete-sa
      restartPolicy: Never
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      containers:
      - name: observability-monitoring-cleanup
        image: {{ .Values.images.endpointMonitoringOperator }}
        command:
        - /usr/local/bin/endpoint-monitoring-operator
        args:
        - cleanup
        - --cluster-name={{ .Values.clusterName }}
        - --hub-alertmanager-ca-secret={{ .Values.alertmanagerRouterCASecretName }}
        resources:
        {{- $matched := false }}
        {{- if .Values.global.resourceRequirements }}
        {{- $reverseResourceRequirements := reverse .Values.global.resourceRequirements -}}
        {{- range $requirement := $reverseResourceRequirements -}}
          {{- if regexMatch $requirement.containerIDRegex (printf "jobs:%s:%s" $appName "observability-monitoring-cleanup") }}
            {{- $matched = true }}
            {{- toYaml $requirement.resources | nindent 10 }}
            {{- break -}}
          {{- end -}}
        {{- end }}
        {{- end }}
        {{- if not $matched }}
          requests:
            cpu: 1m
            memory: 31Mi
          limits:
            memory: 50Mi
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          runAsNonRoot: true
          readOnlyRootFilesystem: true
{{- end }}
