{{- if .Values.platformEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcoa.globalResourcePrefix" (printf "%s-rolebinding" .Values.platform.appName) }}
  labels:
    app.kubernetes.io/component: {{ .Values.platform.component }}
    {{ include "metricshelm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcoa.globalResourcePrefix" (printf "%s-role" .Values.platform.appName) }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.platform.appName }}
  namespace: {{ .Release.Namespace }}
{{- end }}