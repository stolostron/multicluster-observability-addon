{{- if or .Values.platformEnabled .Values.userWorkloadsEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcoa.globalResourcePrefix" "endpoint-monitoring-operator" }}
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator
    {{- include "metricshelm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcoa.globalResourcePrefix" "endpoint-monitoring-operator" }}
subjects:
- kind: ServiceAccount
  name: endpoint-monitoring-operator
  namespace: {{ .Release.Namespace }}
{{- end }}
