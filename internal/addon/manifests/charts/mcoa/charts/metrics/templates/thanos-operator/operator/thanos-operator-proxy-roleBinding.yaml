{{- if .Values.thanosOperator.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.thanosOperator.appName }}-proxy-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: {{ .Values.thanosOperator.component }}
    app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
    {{ include "metricshelm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.thanosOperator.appName }}-proxy-role
subjects:
- kind: ServiceAccount
  name: {{ .Values.thanosOperator.appName }}-controller-manager
  namespace: {{ .Release.Namespace }}
{{- end }}