{{- if .Values.thanosOperator.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mcoa-store-memcached
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: store-memcached
    app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
    {{ include "metricshelm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.thanosOperator.memcached.storeReplicas }}
  serviceName: mcoa-store-memcached
  selector:
    matchLabels:
      app.kubernetes.io/component: store-memcached
      app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: store-memcached
        app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
        app.kubernetes.io/part-of: multicluster-observability-addon
    spec:
      containers:
      - name: memcached
        image: {{ .Values.thanosOperator.memcached.image }}
        args:
        - -m {{ .Values.thanosOperator.memcached.memoryLimitMB }}
        - -c {{ .Values.thanosOperator.memcached.connectionLimit }}
        - -I {{ .Values.thanosOperator.memcached.maxItemSize }}
        - -v
        ports:
        - containerPort: 11211
          name: client
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 45m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: {{ .Values.thanosOperator.memcached.memoryLimitMB }}Mi
      - name: exporter
        image: {{ .Values.thanosOperator.memcached.exporterImage }}
        args:
        - --memcached.address=localhost:11211
        ports:
        - containerPort: 9150
          name: metrics
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 5m
            memory: 50Mi
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- else }}
      nodeSelector:
        kubernetes.io/os: linux
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: mcoa-store-memcached
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: store-memcached
    app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
    {{ include "metricshelm.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
  - name: client
    port: 11211
    targetPort: 11211
  - name: metrics
    port: 9150
    targetPort: 9150
  selector:
    app.kubernetes.io/component: store-memcached
    app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
{{- end }}