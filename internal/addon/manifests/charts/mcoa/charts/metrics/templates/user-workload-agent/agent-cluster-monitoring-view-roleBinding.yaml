{{- if .Values.userWorkloadsEnabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcoa.globalResourcePrefix" (printf "%s-cluster-monitoring-view-rolebinding" .Values.userWorkload.appName) }}
  labels:
    app.kubernetes.io/component: {{ .Values.userWorkload.component }}
    {{ include "metricshelm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: {{ .Values.userWorkload.appName }}
  namespace: {{ .Release.Namespace }}
{{- end }}