{{- if .Values.deployNonOCPStack }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mcoa.globalResourcePrefix" (printf "%s-federate" .Values.platform.appName) }}
  labels:
    {{- include "metricshelm.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - "/federate"
  verbs:
  - "get"
{{- end }}
