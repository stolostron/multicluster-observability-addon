{{- if and (or .Values.platformEnabled .Values.userWorkloadsEnabled) (not .Values.deployNonOCPStack) }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: endpoint-monitoring-operator-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: endpoint-monitoring-operator
    {{- include "metricshelm.labels" . | nindent 4 }}
spec:
  endpoints:
  - interval: 30s
    port: metrics
    scheme: https
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    tlsConfig:
      caFile: /etc/prometheus/configmaps/serving-certs-ca-bundle/service-ca.crt
      serverName: "endpoint-monitoring-operator-metrics.{{ .Release.Namespace }}.svc"
  selector:
    matchLabels:
      app.kubernetes.io/component: endpoint-monitoring-operator
{{- end }}
