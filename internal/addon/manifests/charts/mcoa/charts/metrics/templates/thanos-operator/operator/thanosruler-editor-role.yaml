{{- if .Values.thanosOperator.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/component: {{ .Values.thanosOperator.component }}
        app.kubernetes.io/name: {{ .Values.thanosOperator.appName }}
        {{ include "metricshelm.labels" . | nindent 8 }}
    name: thanos-operator-thanosruler-editor-role
rules:
    - apiGroups:
        - monitoring.thanos.io
      resources:
        - thanosrulers
      verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
    - apiGroups:
        - monitoring.thanos.io
      resources:
        - thanosrulers/status
      verbs:
        - get
{{- end }}
