{{- if and .Values.rightSizing .Values.rightSizing.prediction .Values.rightSizing.prediction.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rs-prediction-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $mcoaHelmLabels := fromYaml (include "mcoahelm.labels" $) }}
    {{- $customLabel := dict "app.kubernetes.io/component" "rs-prediction" }}
    {{- $mergedLabels := mergeOverwrite $mcoaHelmLabels $customLabel }}
    {{- toYaml $mergedLabels | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: rs-prediction
  policyTypes:
    - Egress
  {{- $provider := .Values.rightSizing.prediction.provider | default "builtin" }}
  {{- if or (eq $provider "builtin") (eq $provider "onnx") }}
  egress: []
  {{- else }}
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
  {{- end }}
{{- end }}
