{{- if and .Values.rightSizing .Values.rightSizing.prediction .Values.rightSizing.prediction.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rs-prediction-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- $mcoaHelmLabels := fromYaml (include "mcoahelm.labels" $) }}
    {{- $customLabel := dict "app.kubernetes.io/component" "rs-prediction" }}
    {{- $mergedLabels := mergeOverwrite $mcoaHelmLabels $customLabel }}
    {{- toYaml $mergedLabels | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rs-prediction-role
  labels:
    {{- $mcoaHelmLabels := fromYaml (include "mcoahelm.labels" $) }}
    {{- $customLabel := dict "app.kubernetes.io/component" "rs-prediction" }}
    {{- $mergedLabels := mergeOverwrite $mcoaHelmLabels $customLabel }}
    {{- toYaml $mergedLabels | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rs-prediction-binding
  labels:
    {{- $mcoaHelmLabels := fromYaml (include "mcoahelm.labels" $) }}
    {{- $customLabel := dict "app.kubernetes.io/component" "rs-prediction" }}
    {{- $mergedLabels := mergeOverwrite $mcoaHelmLabels $customLabel }}
    {{- toYaml $mergedLabels | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rs-prediction-role
subjects:
  - kind: ServiceAccount
    name: rs-prediction-sa
    namespace: {{ .Release.Namespace }}
{{- end }}
